version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: zwdha-postgres-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: zwdha_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zwdha-app
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:mysecretpassword@db:5432/zwdha_db
      - JWT_SECRET=zwdha-super-secret-key-123456
      - PORT=3000
    depends_on:
      - db

volumes:
  postgres_data:
